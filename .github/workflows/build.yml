name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---> THIS IS THE FIX: FORCE GITHUB TO USE STABLE PYTHON 3.11 <---
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python3 -m pip install "cython<3.0.0" buildozer virtualenv

      - name: Build APK
        run: |
          export ORG_GRADLE_PROJECT_jvmargs="-Xmx3072m -Dorg.gradle.daemon=false"
          python3 -m buildozer android debug
        env:
          PYTHON: python3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: switch-demo-apk
          path: bin/*.apk
