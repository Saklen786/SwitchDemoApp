name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-pip python3-setuptools

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0.0" buildozer virtualenv

      # ---> THE ULTIMATE FIX: RESOLVE 404 & VERSION MISMATCH <---
      - name: Auto-Patch Buildozer Spec
        run: |
          python3 -c "
          import re
          text = open('buildozer.spec').read()
          # 1. Re-enable SDK downloads to fix the AIDL error from previous attempts
          text = text.replace('android.skip_update = True', 'android.skip_update = False')
          
          # 2. Remove any injected local toolchain paths from previous hacks
          text = re.sub(r'(?m)^p4a\.source_dir\s*=.*', '', text)
          
          # 3. Lock BOTH target and host Python to 3.11.9. 
          # (Just '3.11' caused a 404 Not Found on python.org, triggering the 3.14.2 mismatch!)
          text = re.sub(r'(?m)^requirements\s*=.*', 'requirements = python3==3.11.9,hostpython3==3.11.9,kivy==2.3.0,pyjnius,bleak,android', text)
          
          open('buildozer.spec', 'w').write(text)
          "

      - name: Build APK
        run: |
          export ORG_GRADLE_PROJECT_jvmargs="-Xmx3072m -Dorg.gradle.daemon=false"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: switch-demo-apk
          path: bin/*.apk
