name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-pip python3-setuptools

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0.0" buildozer virtualenv

      # ---> THE ULTIMATE FIX: INJECT STABLE P4A DIRECTLY INTO CACHE <---
      # We manually download the toolchain from Jan 2024 before the broken Python 3.14 
      # update existed, and forcefully inject it into Buildozer's hidden folder cache.
      - name: Inject Stable Toolchain
        run: |
          mkdir -p .buildozer/android/platform/
          git clone https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android
          cd .buildozer/android/platform/python-for-android
          git checkout $(git rev-list -n 1 --before="2024-02-01" HEAD)
          cd ../../../../
          
          # Flip the switch inside buildozer.spec so it doesn't overwrite our stable version
          sed -i 's/android.skip_update = False/android.skip_update = True/g' buildozer.spec

      - name: Build APK
        run: |
          export ORG_GRADLE_PROJECT_jvmargs="-Xmx3072m -Dorg.gradle.daemon=false"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: switch-demo-apk
          path: bin/*.apk
